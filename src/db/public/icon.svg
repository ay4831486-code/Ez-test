<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient for Luxury Dark Theme -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0c16" />
      <stop offset="50%" stop-color="#12162b" />
      <stop offset="100%" stop-color="#05060c" />
    </linearGradient>

    <!-- Glowing Rim Border -->
    <linearGradient id="rimGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="30%" stop-color="#8b5cf6" />
      <stop offset="70%" stop-color="#ec4899" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>

    <!-- Gradient for Letter 'E' (Modern Royal Blue) -->
    <linearGradient id="eGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>

    <!-- Gradient for Letter 'Z' (Vivid Violet & Magenta) -->
    <linearGradient id="zGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#d946ef" />
    </linearGradient>

    <!-- Gradient for the Integrated Checkmark Accent -->
    <linearGradient id="checkGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#059669" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>

    <!-- Premium Glow Filters -->
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Luxurious Rounded Squircle Base (App Icon Shield) -->
  <rect x="12" y="12" width="488" height="488" rx="112" fill="url(#bgGrad)" stroke="url(#rimGrad)" stroke-width="12" />

  <!-- Technical Circuit Radial Background Ring (Establishes Depth) -->
  <circle cx="256" cy="256" r="195" fill="none" stroke="#3b82f6" stroke-opacity="0.12" stroke-width="4" stroke-dasharray="12, 12" />
  <circle cx="256" cy="256" r="210" fill="none" stroke="#8b5cf6" stroke-opacity="0.08" stroke-width="2" />

  <!-- Graphic Composition: The "EZ" Monogram & Successful Test Indicator -->
  <g transform="translate(10, 10)">
    
    <!-- Outer Floating Halo Glow -->
    <ellipse cx="246" cy="246" rx="140" ry="140" fill="#8b5cf6" opacity="0.08" filter="url(#neonGlow)" />

    <!-- 1. The Dynamic "E" Structure (Constructed with bold geometric tech bars) -->
    <g id="E_letter">
      <!-- E Vertical Back Stem -->
      <rect x="135" y="150" width="34" height="192" rx="17" fill="url(#eGrad)" />
      
      <!-- E Top Horizontal Prong -->
      <rect x="135" y="150" width="105" height="34" rx="17" fill="url(#eGrad)" />
      
      <!-- E Middle Horizontal Prong -->
      <rect x="135" y="229" width="85" height="34" rx="17" fill="url(#eGrad)" />
      
      <!-- E Bottom Horizontal Prong -->
      <rect x="135" y="308" width="105" height="34" rx="17" fill="url(#eGrad)" />
    </g>

    <!-- 2. The Interlocking Neon "Z" (Carefully aligned & layered to create depth) -->
    <g id="Z_letter" filter="url(#neonGlow)">
      <!-- Z Top Bar -->
      <path d="M 245,150 L 345,150 C 354.4,150 362,157.6 362,167 C 362,176.4 354.4,184 345,184 L 274,184 Z" fill="url(#zGrad)" />

      <!-- Z Diagonal Slash (Expressing speed, agility, and continuous energy) -->
      <path d="M 358,160 L 254,328 C 248,337 254.5,342 264,342 L 345,342 C 354.4,342 362,334.4 362,325 C 362,315.6 354.4,308 345,308 L 316,308 Z" fill="url(#zGrad)" />
    </g>

    <!-- 3. The Integrated Brilliant Green "Success Checkmark" for "TEST" -->
    <!-- Represents top score, accuracy, completion, and NEET/JEE success, fusing with the monogram -->
    <g id="Success_Check" filter="url(#neonGlow)" transform="translate(10, 0)">
      <!-- Checkmark Stem Shadow -->
      <path d="M 270,270 L 320,320 L 410,210" fill="none" stroke="#000000" stroke-width="28" stroke-linecap="round" stroke-linejoin="round" opacity="0.4" />
      
      <!-- Glowing Vivid Checkmark path -->
      <path d="M 270,270 L 320,320 L 410,210" fill="none" stroke="url(#checkGrad)" stroke-width="24" stroke-linecap="round" stroke-linejoin="round" />
      <path d="M 270,270 L 320,320 L 410,210" fill="none" stroke="#ffffff" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />
    </g>

    <!-- 4. Tiny Precision Accents (Aesthetic UI Indicators) -->
    <!-- Two small glowing dots representing checked state/excellence -->
    <circle cx="152" cy="167" r="5" fill="#ffffff" />
    <circle cx="152" cy="325" r="5" fill="#ffffff" />
  </g>
</svg>
