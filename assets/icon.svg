<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Modern App Icon for EZ TEST -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A8A" /> <!-- Tailwind blue-900 -->
      <stop offset="100%" stop-color="#2563EB" /> <!-- Tailwind blue-600 -->
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#E2E8F0" />
    </linearGradient>
    
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="12" stdDeviation="15" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)" />
  
  <!-- Subtle Grid Pattern for Tech/Education Vibe -->
  <g stroke="#ffffff" stroke-opacity="0.05" stroke-width="4">
    <path d="M0,256 L1024,256" />
    <path d="M0,512 L1024,512" />
    <path d="M0,768 L1024,768" />
    <path d="M256,0 L256,1024" />
    <path d="M512,0 L512,1024" />
    <path d="M768,0 L768,1024" />
  </g>

  <!-- Large 'EZ' text in center -->
  <text x="512" y="620" font-family="system-ui, -apple-system, sans-serif" font-size="440" font-weight="900" fill="url(#textGrad)" text-anchor="middle" letter-spacing="-10" filter="url(#shadow)">EZ</text>
</svg>
