name: Build Native Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: 'true'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-apk:
    name: Build Android Debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Web Dependencies
        run: |
          npm config set fetch-retries 10
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retry-maxtimeout 120000
          npm config set maxsockets 20
          npm ci || npm install --no-audit --no-fund

      - name: Build Web Production Bundle
        run: npm run build

      - name: Add Android Platform if missing
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Android platform directory already exists. Skipping cap add."
          fi

      - name: Sync Capacitor Android Project
        run: npx cap sync android

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Restore Pristine Gradle Wrapper JAR
        run: node src/scripts/download-wrapper.cjs

      - name: Make Gradle Wrapper Executable
        run: chmod +x android/gradlew

      - name: Build Debug APK with Gradle
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ez-test-android-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
